services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3111:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=https://brainz.best-web.sk/api

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5111:5000"
    volumes:
      - ./backend:/app
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=sqlite:///brain_calz.db
      - ALLOWED_ORIGINS=https://brainz.best-web.sk,http://brainz.best-web.sk